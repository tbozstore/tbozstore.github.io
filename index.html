<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TboZ Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#3b82f6', // Azul principal
                        darkBg: '#0f172a',
                        cardBg: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        /* Animación suave al cambiar de categoría */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-darkBg text-slate-200 font-sans min-h-screen flex flex-col">

    <header class="bg-cardBg shadow-lg border-b border-slate-700 relative">
        <img src="banner.jpg" 
             alt="Banner principal" 
             class="w-full h-48 md:h-64 object-cover opacity-60">
             
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center drop-shadow-2xl">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-2 tracking-wide">
                <i class="fa-solid fa-cloud-arrow-down text-brand mr-2"></i>TboZ Store
            </h1>
            <p class="text-slate-200 text-lg font-medium bg-black/30 px-4 py-1 rounded-full backdrop-blur-sm">
                APPS, Juegos, Animes, Mangas y más :)
            </p>
        </div>
    </header>

    <nav class="container mx-auto px-4 mt-8">
        <div id="contenedor-categorias" class="flex flex-wrap justify-center gap-2 border-b border-slate-700 pb-4">
            </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <div id="contenedor-tarjetas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="bg-cardBg border-t border-slate-700 py-6 text-center text-slate-400 mt-auto">
        <p>© 2026 Mi TboZStore. GitHub Pages.</p>
    </footer>

    <script>
        // 1. BASE DE DATOS: Agrega o modifica tus categorías y enlaces aquí.
        const baseDeDatos = {
            
            // Categoría 1
            "Juegos": [
                {
                    titulo: "I Wanna Be The Boshy",
                    descripcion: "Creado en 2010 por Solgrym. Clasico kaizo 2D de la saga i wanna be con una difucultad demoniaca.",
                    imagen: "image/boshy.png", // Recuerda que para que se vea en internet, debes subir esta imagen a GitHub o usar un link de internet
                    enlace: "https://www.mediafire.com/file/nr55aa3lc6x5bi1/Boshy.zip"
                },
                {
                    titulo: "Geometry Dash (2.2081)",
                    descripcion: "Creado en 2013 por RobTop Games. Juego de plataformas ritmico diicil. ",
                    imagen: "image/GD.jpg",
                    enlace: "https://www.mediafire.com/file/y2l8xa47hdlk3w5/Geometry.Dash.v2.2081.zip/file"
                }
            ],

            // Categoría 2
            "Música": [
                {
                    titulo: "SISTERHOOD",
                    descripcion: "Album creado por Lucy Bedroque en 2023.",
                    imagen: "image/SISTERHOOD.jpg",
                    enlace: "https://www.mediafire.com/file/dhnup4uk4rmlub6/SISTERHOOD+(Lucy+Bedroque).zip/file"
                }
            ],

            // Categoría 3
            "Dependencias y Aplicaciones": [
                {
                    titulo: "Dependencias Importantes (Windows)",
                    descripcion: "Dependencias indispensables de Windows para que los Juegos y Apps funcionen correctamente en tu PC",
                    imagen: "image/Dependencias.png",
                    enlace: "https://www.mediafire.com/file/jyq97qzbhfv7e8v/Dependencias_Necesarias_%2528Win%2529.zip/file" 
                }
            ],

            // Categoría 4
            "Animes": [
                {
                    titulo: "Naruto",
                    descripcion: "Anime creado en 2002 por Masashi Kishimoto. El comienzo de las aventuras de naruto empieza aqui!",
                    imagen: "image/Naruto.jpg",
                    enlace: "https://www.mediafire.com/file/jyq97qzbhfv7e8v/Dependencias_Necesarias_%2528Win%2529.zip/file"
                }
            ]
        };

        // =======================================================
        // LÓGICA DE LA PÁGINA 
        // =======================================================
        
        let categoriaActual = Object.keys(baseDeDatos)[0]; // Selecciona la primera por defecto

        function inicializarWeb() {
            renderizarPestanas();
            renderizarTarjetas(categoriaActual);
        }

        function renderizarPestanas() {
            const contenedor = document.getElementById('contenedor-categorias');
            contenedor.innerHTML = '';
            
            Object.keys(baseDeDatos).forEach(categoria => {
                const btn = document.createElement('button');
                btn.innerText = categoria;
                
                // Estilos base del botón
                btn.className = `px-5 py-2 rounded-full font-medium transition-all duration-300 ${
                    categoria === categoriaActual 
                    ? 'bg-brand text-white shadow-[0_0_15px_rgba(59,130,246,0.5)]' 
                    : 'bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white'
                }`;
                
                // Evento al hacer clic
                btn.onclick = () => {
                    categoriaActual = categoria;
                    renderizarPestanas(); 
                    renderizarTarjetas(categoria); 
                };
                contenedor.appendChild(btn);
            });
        }

        function renderizarTarjetas(categoria) {
            const contenedor = document.getElementById('contenedor-tarjetas');
            contenedor.innerHTML = ''; // Limpiar anteriores
            
            const items = baseDeDatos[categoria] || [];

            if (items.length === 0) {
                contenedor.innerHTML = `<p class="col-span-full text-center text-slate-500 py-10">No hay elementos en esta categoría aún.</p>`;
                return;
            }

            items.forEach(item => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'bg-cardBg rounded-xl overflow-hidden shadow-lg border border-slate-700 hover:border-brand transition-colors duration-300 flex flex-col h-full fade-in';
                
                const imgUrl = item.imagen ? item.imagen : 'https://via.placeholder.com/500x300/1e293b/ffffff?text=Sin+Imagen';

                tarjeta.innerHTML = `
                    <div class="h-48 overflow-hidden bg-white flex items-center justify-center p-4">
                        <img src="${imgUrl}" alt="${item.titulo}" class="max-h-full max-w-full object-contain hover:scale-105 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/500x300/1e293b/ffffff?text=Error+de+Imagen'">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h3 class="text-xl font-bold text-white mb-6">${item.titulo}</h3>
                        
                        <p class="text-slate-300 text-sm mb-6 flex-grow leading-relaxed">${item.descripcion}</p>
                        
                        <a href="${item.enlace}" target="_blank" rel="noopener noreferrer" class="block w-full text-center bg-brand hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors mt-auto">
                            <i class="fa-solid fa-download mr-2"></i>Ir al Link
                        </a>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // Arrancar la página
        window.onload = inicializarWeb;
    </script>
</body>
</html>
